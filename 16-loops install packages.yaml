- name: install packages
  hosts: local
  connection: local
  become: yes
  tasks:
  - name: install multiple packages
    ansible.builtin.package:
      name: "{{ item.name }}"
      state: "{{ item.state }}"
    loop: 
    - { name="nginx", state="present"}
    - { name="mysql", state="absent"}
    - { name="git", state="absent"}

  - name: start the service
    ansible.builtin.service:
      name: nginx
      started: yes

  