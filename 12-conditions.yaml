- name: conditions in ansible
  hosts: local
  connection: local

  tasks:
  - name: print the facts
    ansible.builtin.debug:
      msg: "{{ ansible_facts }}"
  
  - name: install package if the distributions is RedHat
    ansible.buitin.package:
      name: nginx
      state: present
    when: ansible_facts.os_family=="RedHat"